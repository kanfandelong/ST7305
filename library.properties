sentence=High-performance ST7305 display driver with DMA, multi-buffering, and TE‑sync support.
paragraph=Designed for ESP32 and Arduino-compatible platforms, this library leverages SPI DMA for non‑blocking, asynchronous frame updates, significantly reducing CPU load. It features dual DMA‑safe buffers plus four drawing buffers, enabling triple buffering and tear‑free display refresh via hardware TE (tearing effect) pin interrupt. Inherits all Adafruit_GFX graphics primitives (pixels, lines, rectangles, circles, bitmaps). Additional capabilities include screen rotation (0°/90°/180°/270°), power mode switching (HPM/LPM), voltage tuning, display inversion, smooth full‑screen sliding effects, and buffer management (swap, copy, blend). Optimized for e‑paper and low‑power reflective displays.category=Display
